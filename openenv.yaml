env_id: RouterEnv-v1
version: "2.3.0"
title: "Advanced LLM Model Router - High-Fidelity RL"

# ── API Surface ─────────────────────────────────────────────────────────────
api:
  transport: http
  port: 7860
  endpoints:
    reset:  POST /reset
    step:   POST /step
    state:  GET  /state

# ── Data Models ─────────────────────────────────────────────────────────────
models:
  observation: router_env.models.RouterObservation
  action:      router_env.models.RouterAction
  state:       router_env.models.RouterState
  entrypoint:  router_env.environment:RouterEnvironment

# ── Domain Characteristics ──────────────────────────────────────────────────
domain: "Workflow Automation"
real_world_task: "LLM Model Routing"
agent_capability: "Cost-Benefit Reasoning"

# ── Task Catalogue (15 Evaluated Tasks) ─────────────────────────────────────
tasks:
  - id: sentiment
    description: "Multi-review sentiment classification."
  - id: spam_filter
    description: "Proactive spam and phishing detection."
  - id: regex_extract
    description: "Log analysis and date extraction."
  - id: markdown_gen
    description: "JSON-to-Markdown documentation workflow."
  - id: data_clean
    description: "User data normalization and cleaning."
  - id: refactor_mono
    description: "Complex code modularization and refactoring."
  - id: sql_logic
    description: "Logical auditing for SQL queries."
  - id: unit_test_gen
    description: "Comprehensive software test generation."
  - id: tech_summary
    description: "Technical document distillation for business users."
  - id: support_reply
    description: "Empathetic customer service orchestration."
  - id: security_audit
    description: "Advanced OWASP API security auditing."
  - id: legal_contract
    description: "Legal-grade EN-ZH translation workflow."
  - id: arch_review
    description: "Infrastructure risk and SPOF assessment."
  - id: api_design
    description: "Fintech system design and contract drafting."
  - id: pii_obfuscate
    description: "Medical-grade data privacy redaction."

# ── Reward Design ───────────────────────────────────────────────────────────
reward:
  description: "Accuracy-Cost hybrid strictly in (0.1, 0.9)"
  signal: "Continuous (Strict compliance range)"

# ── Runtime Constraints ─────────────────────────────────────────────────────
runtime:
  docker: true
  cpu: 2
  memory_gb: 8
